<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>JobPortal Dashboard</h1>
        </header>

        <div class="dashboard">
            <div class="start-card">
                <p>Total Available</p>
                <h2 id="total-jobs-count">0</h2>
            </div>
            <div class="strat-card interview">
                <p>Shortlisted (Interview)</p>
                <h2 id="interview-count">0</h2>
            </div>
            <div class="strat-card rejected">
                <p>Not Selected (Rejected)</p>
                <h2 id="rejected-count">0</h2>
            </div>
        </div>

        <div class="section-header">
            <div class="header-left">
                <h2>Available Jobs</h2>
            </div>
            <div class="header-right">
                <p>Jobs Count: <span id="current-tab-count">0</span></p>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('all', event)">All Jobs</button>
            <button class="tab-btn" onclick="switchTab('interview', event)">Interview</button>
            <button class="tab-btn" onclick="switchTab('rejected', event)">Rejected</button>
        </div>

        <div id="job-grid" class="job-grid">
            </div>

        <div id="empty-state" class="empty-state">
            <img src="jobs.png" alt="Empty Box">
            <h3>No Jobs Available</h3>
            <p>You haven't added any jobs to this category yet.</p>
        </div>
    </div>

    <script>
        // Initial Job Data (Requirement: Minimum 8 cards)
        let jobs = [
            { id: 1, companyName: "Mobile First Corp", position: "React Native Developer", location: "Remote", type: "Full-time", salary: "$130000 - $175000k", description: "Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.", status: "all" },
            { id: 2, companyName: "WebFlow Agency", position: "Web Designer & Developer", location: "Los Angeles, CA", type: "Part-time", salary: "$80,000 - $120,000", description: "Create stunning web experiences for high-profile clients. Must have portfolio and experience with modern web design trends.", status: "all" },

            { id: 3, companyName: "DataViz Solutions", position: "Data Visualization Specialist", location: "Boston,MA", type: "Full-Time", salary: "$125,000 - $165,000", description: "Transform complex data into compelling visualizations. Required skills: D3.js, React, and strong analytical thinking.", status: "all" },

            { id: 4, companyName: "CloudFirst Inc", position: "Backend Developer", location: "Seattle, WA", type: "Full-time", salary: "$140,000 - $190,000", description: "Design and maintain scalable backend systems using Python and AWS. Work with modern DevOps practices and cloud infrastructure.", status: "all" },
            
            { id: 5, companyName: "Innovation Labs", position: "UI/UX Engineer", location: "Austin, TX", type: "Full-time", salary: " $110,000 - $150,000", description: "Create beautiful and functional user interfaces for our suite of products. Strong design skills and frontend development expertise required.", status: "all" },
            
            { id: 6, companyName: "MegaCorp Solutions", position: "FJavaScript Developerull", location: "New York, NY", type: "Full-time", salary: "$130,000 - $170,000", description: "Build enterprise applications with JavaScript and modern frameworks. We offer competitive compensation, health insurance, and professional development opportunities.", status: "all" },

            { id: 7, companyName: "StartupXYZ", position: "Full Stack Engineer", location: "Remote", type: "Full-time", salary: "$120,000 - $160,000", description: "Write automated test scripts using Selenium and Jest.", status: "all" },

            { id: 8, companyName: "TechCorp Industries", position: "Senior Frontend Developer", location: "San Francisco, CA", type: "Full-time", salary: "$130,000 - $175,000", description: "We are looking for an experienced Frontend Developer to build scalable web applications using React and TypeScript. You will work with a talented team on cutting-edge projects.", status: "all" }
        ];

        let activeTab = 'all';

        function renderUI() {
            const grid = document.getElementById('job-grid');
            const emptyState = document.getElementById('empty-state');
            
            const filteredData = jobs.filter(job => activeTab === 'all' ? true : job.status === activeTab);
            
            grid.innerHTML = "";
            document.getElementById('current-tab-count').innerText = filteredData.length;

            if (filteredData.length === 0) {
                grid.style.display = "none";
                emptyState.style.display = "block";
            } else {
                grid.style.display = "grid";
                emptyState.style.display = "none";

                filteredData.forEach(job => {
                    grid.innerHTML += `
                        <div class="job-card">
                            <button class="delete-btn" onclick="deleteJob(${job.id})">×</button>
                            <span class="company-tag">${job.companyName}</span>
                            <h3>${job.position}</h3>
                            <p class="loc-type"> ${job.location} |  ${job.type}</p>
                            <p class="salary"> ${job.salary}</p>
                            <p class="desc">${job.description}</p>
                            <div class="actions">
                                <button class="btn-int ${job.status === 'interview' ? 'active-status' : ''}" onclick="updateStatus(${job.id}, 'interview')">Interview</button>
                                <button class="btn-rej ${job.status === 'rejected' ? 'active-status' : ''}" onclick="updateStatus(${job.id}, 'rejected')">Rejected</button>
                            </div>
                        </div>
                    `;
                });
            }
            updateDashboard();
        }

        function switchTab(tab, event) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderUI();
        }

        function updateStatus(id, newStatus) {
            const job = jobs.find(j => j.id === id);
            job.status = (job.status === newStatus) ? 'all' : newStatus;
            renderUI();
        }

        function deleteJob(id) {
            jobs = jobs.filter(j => j.id !== id);
            renderUI();
        }

        function updateDashboard() {
            document.getElementById('total-jobs-count').innerText = jobs.length;
            document.getElementById('interview-count').innerText = jobs.filter(j => j.status === 'interview').length;
            document.getElementById('rejected-count').innerText = jobs.filter(j => j.status === 'rejected').length;
        }

        renderUI();
    </script>
</body>
</html>
